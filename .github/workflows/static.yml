# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Clean up files not needed for static site deployment
        run: |
          # Remove heavy PowerPoint template (36MB) only used by offline python scripts
          rm -f secretarytools/slide-template.pptx
          
          # Remove unused root lotto directory (22MB)
          rm -rf lotto/
          
          # Remove python scripts and caches
          find . -name "*.py" -delete
          find . -name "__pycache__" -type d -exec rm -rf {} +
          
          # Remove backup files
          find . -name "*.bak" -delete
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Delete artifact immediately after deployment
        if: always()
        run: |
          # Get artifact ID for 'github-pages'
          artifact_id=$(gh api repos/${{ github.repository }}/actions/artifacts?name=github-pages --jq '.artifacts[0].id')
          if [ -n "$artifact_id" ] && [ "$artifact_id" != "null" ]; then
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id
            echo "Artifact $artifact_id deleted successfully."
          else
            echo "No deployment artifact found to delete."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
