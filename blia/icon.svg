<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Beautiful radial gold gradient for background -->
    <radialGradient id="goldBg" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#fffdf8" />
      <stop offset="100%" stop-color="#f5efe2" />
    </radialGradient>
    <!-- Gold gradient for the lotus -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a373" />
      <stop offset="50%" stop-color="#a87a4f" />
      <stop offset="100%" stop-color="#8a5a2f" />
    </linearGradient>
  </defs>
  <!-- Circular container background -->
  <circle cx="256" cy="256" r="240" fill="url(#goldBg)" stroke="#d4a373" stroke-width="6" />
  
  <!-- Lotus flower path styled elegantly -->
  <g fill="url(#goldGrad)">
    <!-- Central petal -->
    <path d="M 256 100 C 220 220, 220 380, 256 420 C 292 380, 292 220, 256 100 Z" />
    <!-- Inner left petal -->
    <path d="M 256 160 C 140 220, 160 380, 256 420 C 180 380, 190 240, 256 160 Z" />
    <!-- Inner right petal -->
    <path d="M 256 160 C 372 220, 352 380, 256 420 C 332 380, 322 240, 256 160 Z" />
    <!-- Outer left petal -->
    <path d="M 256 210 C 60 250, 80 400, 256 420 C 110 400, 120 300, 256 210 Z" />
    <!-- Outer right petal -->
    <path d="M 256 210 C 452 250, 432 400, 256 420 C 402 400, 392 300, 256 210 Z" />
    <!-- Bottom leaf support -->
    <path d="M 140 400 C 190 435, 322 435, 372 400 C 310 385, 202 385, 140 400 Z" />
  </g>
</svg>
