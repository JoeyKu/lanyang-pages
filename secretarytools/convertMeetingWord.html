<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月例會文件產生器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <style>
        :root {
            --primary-color: #a87a4f;
            --accent-color: #d4a373;
            --bg-color: #fdfaf3;
            --card-bg: #ffffff;
            --text-main: #3d2c1b;
            --text-secondary: #6b4f35;
            --shadow: 0 10px 25px rgba(168, 122, 79, 0.1);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            font-size: 18px;
            line-height: 1.6;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 36px; color: var(--primary-color); margin-bottom: 12px; }
        .header p { color: var(--text-secondary); font-size: 16px; }

        .tool-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(168, 122, 79, 0.1);
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 32px 0 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(168, 122, 79, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title:first-of-type { margin-top: 0; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { margin-bottom: 20px; }
        label {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e0d5c8;
            font-size: 16px;
            font-family: inherit;
            background: #fff;
            transition: var(--transition);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.7;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.1);
        }
        .actions { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 18px;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: inherit;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover:not(:disabled) { background-color: var(--accent-color); transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background-color: var(--bg-color);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .error { color: #e74c3c; font-size: 13px; margin-top: 6px; }
        .spinner {
            display: inline-block;
            width: 30px; height: 30px;
            border: 3px solid rgba(168, 122, 79, 0.1);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

        /* ── Proposal cards ── */
        .proposal-card {
            background: #fdf6ec;
            border: 1px solid rgba(168, 122, 79, 0.18);
            border-left: 4px solid var(--accent-color);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 16px;
            transition: var(--transition);
        }
        .proposal-card:last-child { margin-bottom: 0; }
        .proposal-card:hover {
            box-shadow: 0 4px 16px rgba(168, 122, 79, 0.12);
        }
        .proposal-header {
            font-size: 17px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .proposal-case {
            font-size: 15px;
            color: var(--text-main);
            background: white;
            border-radius: 8px;
            padding: 8px 14px;
            margin-bottom: 14px;
            border: 1px solid rgba(168, 122, 79, 0.1);
            line-height: 1.8;
        }
        .proposal-card .input-group { margin-bottom: 0; }

        .proposals-hint {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            padding: 14px;
            background: #f9f4ed;
            border-radius: 10px;
            border: 1px dashed rgba(168, 122, 79, 0.25);
        }

        /* ── File drop areas (for PPTX uploads) ── */
        .file-drop-area {
            border: 2px dashed #d4c4b0;
            border-radius: 10px;
            padding: 18px;
            text-align: center;
            background: #fafaf7;
            transition: var(--transition);
            position: relative;
            cursor: pointer;
            margin-top: 8px;
        }
        .file-drop-area.dragover {
            border-color: var(--primary-color);
            background: rgba(168, 122, 79, 0.05);
        }
        .file-drop-area input[type="file"] {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-drop-text { font-size: 14px; color: var(--text-secondary); pointer-events: none; }
        .file-name { margin-top: 6px; font-size: 13px; font-weight: 600; color: var(--primary-color); pointer-events: none; }

        /* ── Download button row ── */
        .download-row { display: flex; gap: 12px; }
        .download-row button { flex: 1; width: auto; }
        .btn-slide { background-color: #5a7a9f; color: white; }
        .btn-slide:hover:not(:disabled) { background-color: #7498b8; transform: translateY(-2px); }
        .btn-slide:disabled { opacity: 0.6; cursor: not-allowed; }

        /* ── Summary section ── */
        #summaryText hr { margin: 15px 0; border: 0; border-top: 1px solid #ddd; }
        #summaryText b { color: black; }
        #summaryText font[size="+2"] { display: block; margin-top: 10px; color: black; }

        /* ── Info section blocks ── */
        .section-block {
            background: #fdf8f2;
            border: 1px solid rgba(168, 122, 79, 0.18);
            border-radius: 14px;
            padding: 22px 26px 18px;
            margin-bottom: 20px;
        }
        .section-block > .section-title {
            margin-top: 0;
        }
        .section-block > .input-group:last-child,
        .section-block > .input-row:last-child { margin-bottom: 0; }
        .file-block {
            background: #f5f8fd;
            border-color: rgba(90, 122, 159, 0.22);
        }

        @media (max-width: 640px) {
            body { padding: 20px 15px; }
            .tool-card { padding: 25px 20px; }
            .input-row { grid-template-columns: 1fr; }
            .header h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <main>
            <div class="header">
                <h1>月例會文件產生器</h1>
                <p>自動修改聯合月例會 Word 文件，並可一鍵產生分會會議簡報。</p>
            </div>

            <div class="tool-card">
                <form id="docForm">
                    <!-- ── 上傳檔案（最上方） ── -->
                    <div class="section-block file-block">
                        <div class="section-title">📂 上傳檔案</div>

                        <div class="input-group">
                            <label for="file">聯合月例會 Word 檔案 <span style="color:#e74c3c;">.docx</span></label>
                            <div class="file-drop-area" id="wordDropArea">
                                <div class="file-drop-text">點擊或拖放 .docx 至此</div>
                                <div class="file-name" id="wordFileName"></div>
                                <input type="file" id="file" name="file" accept=".docx" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="proposalFile">聯合月例會投影片 <span style="color:#e74c3c;">.pptx</span> <span style="font-size:13px; font-weight:normal; color:#888;">[選填] 擷取「提案討論」至「臨時動議」</span></label>
                            <div class="file-drop-area" id="proposalDropArea">
                                <div class="file-drop-text">點擊或拖放 .pptx 至此</div>
                                <div class="file-name" id="proposalFileName"></div>
                                <input type="file" id="proposalFile" name="proposalFile" accept=".pptx">
                            </div>
                        </div>

                        <div class="input-group" style="margin-bottom:0;">
                            <label for="reportFile">分會工作報告 <span style="color:#e74c3c;">.pptx</span> <span style="font-size:13px; font-weight:normal; color:#888;">[選填] 插入在「工作報告」之後</span></label>
                            <div class="file-drop-area" id="reportDropArea">
                                <div class="file-drop-text">點擊或拖放 .pptx 至此</div>
                                <div class="file-name" id="reportFileName"></div>
                                <input type="file" id="reportFile" name="reportFile" accept=".pptx">
                            </div>
                        </div>
                    </div>

                    <!-- ── 宣讀上次決議案執行成效 ── -->
                    <div id="proposalsSection" style="display:none; margin-bottom: 20px;">
                        <div class="section-title">📋 宣讀上次決議案執行成效</div>
                        <div id="proposalsList"></div>
                    </div>

                    <div class="section-block">
                        <div class="section-title">📅 會議基本資訊</div>

                        <div class="input-row">
                            <div class="input-group">
                                <label for="date">日期</label>
                                <input type="date" id="date" name="date" required>
                                <div id="dateError" class="error"></div>
                            </div>

                            <div class="input-group">
                                <label for="time">時間</label>
                                <input type="text" id="time" name="time" placeholder="例如：19:30" required>
                                <div id="timeError" class="error"></div>
                            </div>

                            <div class="input-group">
                                <label for="room">地點</label>
                                <input type="text" id="room" name="room" placeholder="例如：蘭陽別院3樓305室" required>
                            </div>

                            <div class="input-group">
                                <label for="name">分會名稱</label>
                                <input type="text" id="name" name="name" placeholder="例如：宜六" required>
                            </div>
                        </div>
                    </div>

                    <div class="section-block">
                        <div class="section-title">👥 會議人員</div>

                        <div class="input-row">
                            <div class="input-group">
                                <label for="chairman">主席</label>
                                <input type="text" id="chairman" name="chairman" placeholder="例如：OOO會長" required>
                            </div>

                            <div class="input-group">
                                <label for="mc">司儀</label>
                                <input type="text" id="mc" name="mc" placeholder="例如：王小明" required>
                            </div>

                            <div class="input-group">
                                <label for="computer">電腦</label>
                                <input type="text" id="computer" name="computer" placeholder="例如：王小明" required>
                            </div>
                        </div>
                    </div>

                    <!-- ── 簡報設定 ── -->
                    <div class="section-block">
                        <div class="section-title">🎞 簡報設定</div>
                        <div class="input-row">
                            <div class="input-group">
                                <label for="year">年份（民國）</label>
                                <input type="number" id="year" name="year" placeholder="例如：115">
                            </div>
                            <div class="input-group">
                                <label for="month">月份</label>
                                <input type="number" id="month" name="month" placeholder="例如：4">
                            </div>
                            <div class="input-group">
                                <label for="speaker">宣講員</label>
                                <input type="text" id="speaker" name="speaker" placeholder="例如：OOO (三好分會)">
                            </div>
                            <div class="input-group">
                                <label for="supervisor">上級指導</label>
                                <input type="text" id="supervisor" name="supervisor" placeholder="例如：OOO 督導">
                            </div>
                        </div>
                        <div class="input-group" style="margin-top:18px; margin-bottom:0;">
                            <label for="templateFile">公版簡報 <span style="color:#e74c3c;">.pptx</span></label>
                            <div id="templateStatus" style="font-size:14px; margin-bottom:6px; color:var(--text-secondary);">連線中，檢查伺服器公版檔案...</div>
                            <div class="file-drop-area" id="templateDropArea">
                                <div class="file-drop-text">點擊或拖放 .pptx 至此</div>
                                <div class="file-name" id="templateFileName"></div>
                                <input type="file" id="templateFile" name="templateFile" accept=".pptx">
                            </div>
                        </div>
                    </div>

                    <div class="actions">
                        <div class="download-row">
                            <button type="button" id="submitBtn" class="btn-primary" onclick="downloadWord()" disabled>
                                系統初始化中...
                            </button>
                            <button type="button" id="slideBtn" class="btn-slide" onclick="downloadSlide()" disabled>
                                系統初始化中...
                            </button>
                        </div>
                        <a href="index.html" style="text-decoration: none;">
                            <button type="button" class="btn-secondary">返回工具箱</button>
                        </a>
                    </div>
                </form>

                <div id="loading" style="display:none; text-align:center; margin-top:20px;">
                    <div class="spinner"></div>
                    <p id="loadingMsg" style="margin-top:10px; color:var(--text-secondary);">處理中，請稍候...</p>
                </div>

                <div id="alertBox" style="display:none; text-align:center; margin-top:20px; font-size:17px;"></div>

                <!-- ── Proposal text summary (from slide tool) ── -->
                <div id="summarySection" style="display:none; margin-top:32px;">
                    <div class="section-title">📝 提案文字摘要</div>
                    <div style="background:#fff; border:1px solid #e0d5c8; border-radius:12px; padding:20px;">
                        <div id="summaryText" contenteditable="true"
                            style="font-family:'Noto Sans TC',monospace; font-size:15px; min-height:120px; max-height:300px; overflow-y:auto; white-space:pre-wrap; margin-bottom:14px;"></div>
                        <div style="display:flex; justify-content:flex-end;">
                            <button type="button" id="copyBtn" onclick="copyToClipboard()"
                                style="width:auto; padding:10px 22px; background:var(--accent-color); color:white; border-radius:8px; font-size:15px; border:none; cursor:pointer; font-family:inherit;">
                                複製文字
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let pyodide;
        let pyodideReady  = false;
        let pendingFileParse = null;
        let pySlideScript = '';
        let preloadedTemplateBuffer = null;

        const submitBtn  = document.getElementById('submitBtn');
        const slideBtn   = document.getElementById('slideBtn');
        const loadingDiv = document.getElementById('loading');
        const loadingMsg = document.getElementById('loadingMsg');
        const alertBox   = document.getElementById('alertBox');

        const WORD_LS  = ['time', 'room', 'name', 'chairman', 'mc', 'computer'];
        const SLIDE_LS = ['year', 'month', 'speaker', 'supervisor'];
        const LS_FIELDS = [...WORD_LS, ...SLIDE_LS]; // kept for compatibility

        function saveToLocalStorage() {
            WORD_LS.forEach(id  => localStorage.setItem('meeting_' + id, document.getElementById(id).value));
            SLIDE_LS.forEach(id => localStorage.setItem('slides_'  + id, document.getElementById(id).value));
        }

        function loadFromLocalStorage() {
            WORD_LS.forEach(id => {
                const val = localStorage.getItem('meeting_' + id);
                if (val) document.getElementById(id).value = val;
            });
            SLIDE_LS.forEach(id => {
                const val = localStorage.getItem('slides_' + id);
                if (val) document.getElementById(id).value = val;
            });
        }

        [...WORD_LS, ...SLIDE_LS].forEach(id => {
            document.getElementById(id).addEventListener('input', saveToLocalStorage);
        });

        // Auto-fill year/month from date field
        document.getElementById('date').addEventListener('change', function () {
            if (!this.value) return;
            const d = new Date(this.value + 'T00:00:00');
            const yearEl  = document.getElementById('year');
            const monthEl = document.getElementById('month');
            if (!yearEl.value)  yearEl.value  = d.getFullYear() - 1911;
            if (!monthEl.value) monthEl.value = d.getMonth() + 1;
        });

        function validateDate(dateStr) {
            if (!dateStr) return false;
            const d = new Date(dateStr);
            return d instanceof Date && !isNaN(d);
        }

        function validateTime(timeStr) {
            if (!/^\d{2}:\d{2}$/.test(timeStr)) return false;
            const [h, m] = timeStr.split(':').map(Number);
            return h >= 0 && h <= 23 && m >= 0 && m <= 59;
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }

        document.getElementById('time').addEventListener('input', function () {
            showError('timeError', validateTime(this.value) ? '' : '請輸入正確的時間格式 HH:MM');
        });

        // ── File change: auto-parse proposals ──
        document.getElementById('file').addEventListener('change', async function () {
            if (this.files[0]) {
                if (pyodideReady) {
                    await parseProposals(this.files[0]);
                } else {
                    pendingFileParse = this.files[0];
                }
            } else {
                document.getElementById('proposalsSection').style.display = 'none';
                document.getElementById('proposalsList').innerHTML = '';
            }
        });

        async function parseProposals(file) {
            const list = document.getElementById('proposalsList');
            list.innerHTML = '<div class="proposals-hint">📖 解析文件中，請稍候…</div>';
            document.getElementById('proposalsSection').style.display = 'block';
            try {
                const fileData = await file.arrayBuffer();
                pyodide.FS.writeFile('/input.docx', new Uint8Array(fileData));
                const result = await pyodide.runPythonAsync(`extract_proposals()`);
                const proposals = JSON.parse(result);
                displayProposals(proposals);
            } catch (e) {
                console.error('解析提案失敗:', e);
                document.getElementById('proposalsSection').style.display = 'none';
                list.innerHTML = '';
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function displayProposals(proposals) {
            const section = document.getElementById('proposalsSection');
            const list    = document.getElementById('proposalsList');

            if (!proposals || proposals.length === 0) {
                section.style.display = 'none';
                list.innerHTML = '';
                return;
            }

            list.innerHTML = '';
            proposals.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'proposal-card';
                const labelText = escapeHtml(p.label || '執行成效');
                card.innerHTML = `
                    <div class="proposal-header">${escapeHtml(p.header)}</div>
                    <div class="proposal-case">案　　由：${escapeHtml(p.title)}</div>
                    <div class="input-group">
                        <label for="effectiveness_${i}">${labelText}</label>
                        <textarea id="effectiveness_${i}" rows="3" placeholder="請輸入${labelText}…"></textarea>
                    </div>
                `;
                list.appendChild(card);
            });
            section.style.display = 'block';
        }

        // ── Shared: collect form values ──────────────────────────────────
        function getWordVals() {
            return {
                date:     document.getElementById('date').value.trim(),
                time:     document.getElementById('time').value.trim(),
                room:     document.getElementById('room').value.trim(),
                name:     document.getElementById('name').value.trim(),
                chairman: document.getElementById('chairman').value.trim(),
                mc:       document.getElementById('mc').value.trim(),
                computer: document.getElementById('computer').value.trim(),
                file:     document.getElementById('file'),
            };
        }

        function validateWordVals(v) {
            let ok = true;
            if (!validateDate(v.date)) { showError('dateError', '請選擇日期'); ok = false; }
            else showError('dateError', '');
            if (!validateTime(v.time)) { showError('timeError', '請輸入正確的時間格式 HH:MM'); ok = false; }
            if (!ok) return false;
            if (!document.getElementById('docForm').checkValidity()) {
                document.getElementById('docForm').reportValidity(); return false;
            }
            if (!v.file.files[0]) {
                alertBox.innerText = '❌ 請先選擇 Word 檔案';
                alertBox.style.color = '#e74c3c'; alertBox.style.display = 'block'; return false;
            }
            return true;
        }

        // ── Core: process Word → /output.docx ───────────────────────────
        async function processWord(v) {
            const file = v.file.files[0];
            const fileData = await file.arrayBuffer();
            pyodide.FS.writeFile('/input.docx', new Uint8Array(fileData));

            const proposalCards = document.querySelectorAll('#proposalsList .proposal-card');
            const eff = [];
            proposalCards.forEach((_, i) => {
                const ta = document.getElementById(`effectiveness_${i}`);
                eff.push(ta ? ta.value.trim() : '');
            });

            pyodide.globals.set('_date_str',           v.date);
            pyodide.globals.set('_time_str',           v.time);
            pyodide.globals.set('_room_str',           v.room);
            pyodide.globals.set('_name_str',           v.name);
            pyodide.globals.set('_chairman_str',       v.chairman);
            pyodide.globals.set('_mc_str',             v.mc);
            pyodide.globals.set('_computer_str',       v.computer);
            pyodide.globals.set('_effectiveness_json', JSON.stringify(eff));

            await pyodide.runPythonAsync(`
_effectiveness_list = json.loads(_effectiveness_json)
modify_docx(_date_str, _time_str, _room_str, _name_str, _chairman_str, _mc_str, _computer_str, _effectiveness_list)
`);
        }

        function setLoading(msg) {
            loadingMsg.textContent = msg || '處理中，請稍候...';
            loadingDiv.style.display = 'block';
            alertBox.style.display   = 'none';
            submitBtn.disabled = true;
            slideBtn.disabled  = true;
        }
        function clearLoading() {

                    await w.write(blob); await w.close();

            const a = document.createElement('a');
            a.href = url; a.download = suggestedName;
            document.body.appendChild(a); a.click(); a.remove();
            URL.revokeObjectURL(url);

from docx import Document
from docx.oxml.ns import qn
from docx.oxml import OxmlElement
from docx.shared import Pt
from datetime import datetime
import json
import re

ROC_YEAR_OFFSET = 1911
WEEKDAY_ZH = ['星期一', '星期二', '星期三', '星期四', '星期五', '星期六', '星期日']

def format_date_cell(date_str, time_str, room_str):
    dt = datetime.strptime(date_str, "%Y-%m-%d")
    roc_year = dt.year - ROC_YEAR_OFFSET
    month = dt.month
    day = dt.day
    weekday = WEEKDAY_ZH[dt.weekday()]
    hour, minute = map(int, time_str.split(':'))
    if 18 <= hour <= 23:
        period = "晚上"
        display_hour = hour - 12 if hour > 12 else hour
    elif 12 <= hour < 18:
        period = "下午"
        display_hour = hour - 12
    else:
        period = "早上"
        display_hour = hour
    time_display = f"{period}{display_hour:02d}:{minute:02d}"
    return (
        f"日期：{roc_year} 年{month:02d}月{day:02d}日（{weekday}）\\n"
        f"時間：{time_display}\\n"
        f"地點：{room_str}"
    )

def set_cell_text(cell, text, font_size=11):
    cell.text = text
    for p in cell.paragraphs:
        for run in p.runs:
            run.font.name = "標楷體"
            run._element.rPr.rFonts.set(qn('w:eastAsia'), '標楷體')
            run.font.size = Pt(font_size)

def set_cell_text_table_align(cell, text, font_size=11):
    if cell.paragraphs:
        p = cell.paragraphs[0]
        p.text = ""
        run = p.add_run(text)
        run.font.name = "標楷體"
        run._element.rPr.rFonts.set(qn('w:eastAsia'), '標楷體')
        run.font.size = Pt(font_size)
        for i in range(len(cell.paragraphs)-1, 0, -1):
            p_elem = cell.paragraphs[i]._element
            p_elem.getparent().remove(p_elem)
    else:
        cell.text = text

def replace_text_in_paragraph(paragraph, old_text, new_text, font_size=None):
    full_text = "".join(run.text for run in paragraph.runs)
    if old_text not in full_text:
        return False
    for i, run in enumerate(paragraph.runs):
        run.text = "" if i > 0 else full_text.replace(old_text, new_text)
        if i == 0 and font_size:
            run.font.name = "標楷體"
            run.font.size = Pt(font_size)
            if run._element.rPr is not None:
                run._element.rPr.rFonts.set(qn('w:eastAsia'), '標楷體')

def replace_in_document(doc, old_text, new_text, font_size=None):
    for para in doc.paragraphs:
        replace_text_in_paragraph(para, old_text, new_text, font_size)
    for table in doc.tables:
        for row in table.rows:
            for cell in row.cells:
                for para in cell.paragraphs:
                    replace_text_in_paragraph(para, old_text, new_text, font_size)

def style_text_in_paragraph(paragraph, search_text, cell=None):
    full_text = "".join(run.text for run in paragraph.runs)
    if search_text not in full_text:
        return False
    font_name = "標楷體"
    font_size = None
    for run in paragraph.runs:
        if run.font.name:
            font_name = run.font.name
        if run.font.size:
            font_size = run.font.size
        if font_size:
            break
    paragraph.clear()
    parts = full_text.split(search_text)
    for i, part in enumerate(parts):
        if part:
            run = paragraph.add_run(part)
            run.font.name = font_name
            rPr = run._element.get_or_add_rPr()
            rPr.rFonts.set(qn('w:eastAsia'), font_name)
            if font_size:
                run.font.size = font_size
        if i < len(parts) - 1:
            run = paragraph.add_run(search_text)
            run.bold = True
            run.font.name = "標楷體"
            rPr = run._element.get_or_add_rPr()
            rPr.rFonts.set(qn('w:eastAsia'), '標楷體')
            if font_size:
                run.font.size = font_size
            shd = OxmlElement('w:shd')
            shd.set(qn('w:val'), 'clear')
            shd.set(qn('w:color'), 'auto')
            shd.set(qn('w:fill'), 'FFFF00')
            rPr.append(shd)
    if cell is not None:
        tcPr = cell._element.get_or_add_tcPr()
        shd = OxmlElement('w:shd')
        shd.set(qn('w:val'), 'clear')
        shd.set(qn('w:color'), 'auto')
        shd.set(qn('w:fill'), 'FFFF00')
        tcPr.append(shd)
    return True

def delete_textbox_containing(doc, search_text):
    WPS = 'http://schemas.microsoft.com/office/word/2010/wordprocessingShape'
    W   = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main'
    body = doc.element.body
    for txbx in body.findall('.//' + '{' + WPS + '}txbx'):
        text = ''.join(t.text or '' for t in txbx.findall('.//' + '{' + W + '}t'))
        if search_text in text:
            node = txbx
            for _ in range(8):
                node = node.getparent()
            parent = node.getparent()
            if parent is not None:
                parent.remove(node)

def get_paragraphs_in_order(doc):
    """Return all paragraphs in document order, including those inside tables."""
    from docx.text.paragraph import Paragraph as DocxParagraph
    W_NS = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main'
    paragraphs = []
    def process_element(elem):
        tag = elem.tag.split('}')[-1] if '}' in elem.tag else elem.tag
        if tag == 'p':
            paragraphs.append(DocxParagraph(elem, doc))
        elif tag == 'tbl':
            for p_elem in elem.findall('.//{%s}p' % W_NS):
                paragraphs.append(DocxParagraph(p_elem, doc))
    for child in doc.element.body:
        process_element(child)
    return paragraphs

PROPOSAL_RE = re.compile(r'【提案[一二三四五六七八九十百千\d]+】')

def extract_proposals():
    """Parse /input.docx and return JSON list of proposals found under
    宣讀上次決議案執行成效."""
    doc = Document('/input.docx')
    proposals = []
    current = None
    in_section = False

    for para in get_paragraphs_in_order(doc):
        text = para.text.strip()
        if not text:
            continue

        if '宣讀上次決議案執行成效' in text:
            in_section = True
            continue

        if not in_section:
            continue

        # New proposal header 【提案X】
        m = PROPOSAL_RE.search(text)
        if m:
            if current:
                proposals.append(current)
            current = {'header': m.group(), 'title': '', 'effectiveness': '', 'label': '執行成效'}
            continue

        if current is None:
            continue

        # 案由 line (handles 案　　由 with full-width spaces)
        if '案' in text and '由' in text:
            for ch in ['：', ':']:
                idx = text.find(ch)
                if idx >= 0:
                    current['title'] = text[idx+1:].strip()
                    break
            continue

        # 執行成效 / 執行辦法 line
        eff_label = None
        if '執行成效' in text:
            eff_label = '執行成效'
        elif '執行辦法' in text:
            eff_label = '執行辦法'
        if eff_label:
            current['label'] = eff_label
            for ch in ['：', ':']:
                idx = text.find(ch)
                if idx >= 0:
                    current['effectiveness'] = text[idx+1:].strip()
                    break
            continue

        # Stop at 總會 section (only applies to lines that aren't proposal headers / 案由)
        if '總會' in text and not PROPOSAL_RE.search(text):
            break

        # Heuristic: if we hit a new numbered section, stop
        if re.match(r'^[一二三四五六七八九十\d]+[、.．。]', text):
            break

    if current:
        proposals.append(current)

    return json.dumps(proposals, ensure_ascii=False)

def replace_effectiveness_in_doc(doc, effectiveness_list):
    """Replace 執行成效 content for each proposal, in order."""
    if not effectiveness_list:
        return
    all_paras = get_paragraphs_in_order(doc)
    in_section = False
    proposal_count = 0
    eff_idx = 0

    for para in all_paras:
        text = para.text.strip()
        if not text:
            continue

        if '宣讀上次決議案執行成效' in text:
            in_section = True
            continue

        if not in_section:
            continue

        if PROPOSAL_RE.search(text):
            proposal_count += 1
            continue

        if proposal_count == 0:
            continue

        if '執行成效' in text or '執行辦法' in text:
            if eff_idx < len(effectiveness_list):
                new_val = effectiveness_list[eff_idx]
                eff_idx += 1
                full_text = ''.join(r.text for r in para.runs)
                replaced = False
                for label in ['執行成效', '執行辦法']:
                    for ch in ['：', ':']:
                        key = label + ch
                        idx = full_text.find(key)
                        if idx >= 0:
                            prefix = full_text[:idx + len(key)]
                            new_full = prefix + new_val
                            if para.runs:
                                para.runs[0].text = new_full
                                for run in para.runs[1:]:
                                    run.text = ''
                            replaced = True
                            break
                    if replaced:
                        break
                if not replaced and para.runs:
                    para.runs[0].text = '執行成效：' + new_val
                    for run in para.runs[1:]:
                        run.text = ''

        # Stop at 總會 section
        if '總會' in text and not PROPOSAL_RE.search(text):
            break

        # Stop when leaving the proposals section
        if re.match(r'^[一二三四五六七八九十\d]+[、.．。]', text) and proposal_count > 0:
            break

def delete_tables_in_proposals_section(doc):
    """Delete tables that appear inside the 宣讀上次決議案執行成效 proposals section
    (i.e. 分會 proposals, stopping before 總會 proposals)."""
    W_NS  = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main'
    W_P   = '{%s}p'   % W_NS
    W_TBL = '{%s}tbl' % W_NS
    W_T   = '{%s}t'   % W_NS

    def get_para_text(elem):
        return ''.join(t.text or '' for t in elem.findall('.//' + W_T)).strip()

    def process_container(container_elem):
        """Remove proposal tables that are direct children of container_elem."""
        in_section    = False
        proposal_seen = False
        to_remove     = []

        for child in list(container_elem):
            if child.tag == W_P:
                text = get_para_text(child)
                if '宣讀上次決議案執行成效' in text:
                    in_section = True
                elif in_section:
                    if PROPOSAL_RE.search(text):
                        proposal_seen = True
                    elif '總會' in text and not PROPOSAL_RE.search(text):
                        break
                    elif re.match(r'^[一二三四五六七八九十\d]+[、.．。]', text) and proposal_seen:
                        break
            elif child.tag == W_TBL:
                if in_section and proposal_seen:
                    to_remove.append(child)

        for elem in to_remove:
            container_elem.remove(elem)

    # 1. Try as direct body children (proposals at body level)
    process_container(doc.element.body)

    # 2. Try inside every table cell (handles proposals nested inside the main meeting table)
    for tc in doc.element.body.findall('.//{%s}tc' % W_NS):
        process_container(tc)

def modify_docx(date_str, time_str, room_str, name_str, chairman_str, mc_str, computer_str, effectiveness_list):
    doc = Document('/input.docx')

    table = doc.tables[0]

    # Row 0, Col 0：日期區塊
    set_cell_text(table.rows[0].cells[0], format_date_cell(date_str, time_str, room_str))

    # Row 0, Col 2：主席 / 司儀 / 電腦
    role_text = f"主席：{chairman_str}\\n司儀：{mc_str}\\n電腦：{computer_str}"
    set_cell_text(table.rows[0].cells[2], role_text)

    # Row 3, Col 0
    set_cell_text_table_align(table.rows[3].cells[0], "9.宣講員宣講")

    # Row 4, Col 4
    set_cell_text_table_align(table.rows[4].cells[4], "16.輔導法師開示")

    # 替換標題
    new_title = f"{name_str}月例會活動討論案"
    replace_in_document(doc, "聯合月例會活動討論案", new_title, font_size=20)

    # 分會名稱加粗體 + 黃色底色（全文件所有出現位置）
    for tb in doc.tables:
        for row in tb.rows:
            for cell in row.cells:
                for para in cell.paragraphs:
                    style_text_in_paragraph(para, name_str, cell=cell)

    # 刪除文字框
    delete_textbox_containing(doc, "聯合月例會】")

    # 刪除提案區塊內的表格
    delete_tables_in_proposals_section(doc)

    # 替換執行成效
    replace_effectiveness_in_doc(doc, effectiveness_list)

    doc.save('/output.docx')
    return True

                        area.style.background  = 'rgba(168,122,79,0.05)';
                        defaultTxt.style.display = 'none';
                    } else {
                        nameEl.textContent = '';
                        area.style.borderColor = ''; area.style.background = '';
                        defaultTxt.style.display = 'block';
                    }
                });

                area.addEventListener('dragover',  e => { e.preventDefault(); area.classList.add('dragover'); });
                area.addEventListener('dragleave', ()  => area.classList.remove('dragover'));
                area.addEventListener('drop', e => {
                    e.preventDefault(); area.classList.remove('dragover');
                    if (e.dataTransfer.files.length > 0) {
                        input.files = e.dataTransfer.files;
                        input.dispatchEvent(new Event('change'));
                    }
                });
            });
        });
    </script>
</body>
</html>
