<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>講座名單產生器 - 秘書工具箱</title>
    <meta name="description" content="自動將 Line 接龍訊息轉換為逗號分隔的名單，並套入 Excel 範本產生簽到單。">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary-color: #a87a4f;
            --accent-color: #d4a373;
            --bg-color: #fdfaf3;
            --card-bg: #ffffff;
            --text-main: #3d2c1b;
            --text-secondary: #6b4f35;
            --shadow: 0 10px 25px rgba(168, 122, 79, 0.1);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            font-size: 18px;
            line-height: 1.6;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 36px; color: var(--primary-color); margin-bottom: 12px; }
        .header p { color: var(--text-secondary); font-size: 16px; }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            transition: var(--transition);
        }
        .back-btn:hover {
            color: var(--accent-color);
            transform: translateX(-5px);
        }

        .tool-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(168, 122, 79, 0.1);
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 32px 0 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(168, 122, 79, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title:first-of-type { margin-top:0; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { margin-bottom: 20px; }
        label {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e0d5c8;
            font-size: 16px;
            font-family: inherit;
            background: #fff;
            transition: var(--transition);
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.1);
        }
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        .actions { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 18px;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: inherit;
            gap: 8px;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover:not(:disabled) { background-color: var(--accent-color); transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }
        .btn-secondary:hover {
            background-color: var(--bg-color);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .btn-inline {
            width: auto;
            align-self: flex-start;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .error { color: #e74c3c; font-size: 13px; margin-top: 6px; }
        .spinner {
            display: inline-block;
            width: 30px; height: 30px;
            border: 3px solid rgba(168, 122, 79, 0.1);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        
        @media (max-width: 640px) {
            body { padding: 20px 15px; }
            .tool-card { padding: 25px 20px; }
            .input-row { grid-template-columns: 1fr; }
            .header h1 { font-size: 28px; }
            .btn-inline { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <main>
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path>
                </svg>
                返回工具箱
            </a>

            <div class="header">
                <h1>講座名單產生器</h1>
                <p>整理 LINE 接龍名單並套入 Excel 範本，自動產出精美佛學講座簽到單。</p>
            </div>

            <div class="tool-card">
                <form id="signupForm">
                    <div class="section-title">講座資訊</div>

                    <div class="input-row">
                        <div class="input-group">
                            <label for="title">講座名稱</label>
                            <input type="text" id="title" name="title" placeholder="例如：金剛經導讀與修持" required>
                        </div>

                        <div class="input-group">
                            <label for="branch">分會名稱</label>
                            <input type="text" id="branch" name="branch" placeholder="例如：宜六" required>
                        </div>
                    </div>

                    <div class="section-title">報名名單整理</div>

                    <div class="input-group">
                        <label for="rawInput">原始報名清單 (貼上 LINE 接龍訊息)</label>
                        <textarea id="rawInput" placeholder="佛學講座，請接龍：&#10;1. 哆啦A夢 (備註)&#10;2. 唐老鴨&#10;3. 柯南 - 偵探"></textarea>
                    </div>

                    <button type="button" class="btn-primary btn-inline" onclick="cleanLineList()">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                        整理接龍名單
                    </button>

                    <div id="alertBox" style="display:none; text-align:center; margin-top:10px; margin-bottom:20px; font-size:17px; padding: 12px; border-radius: 8px;"></div>

                    <div class="input-group">
                        <label for="confirmedNames">確認報名名單 (逗號分隔，可自行修改)</label>
                        <textarea id="confirmedNames" placeholder="尚未轉換名單..."></textarea>
                    </div>

                    <div class="actions">
                        <button type="button" id="submitBtn" class="btn-primary" onclick="submitForm()" disabled>
                            系統初始化中...
                        </button>
                        <a href="index.html" style="text-decoration: none;">
                            <button type="button" class="btn-secondary">返回工具箱</button>
                        </a>
                    </div>
                </form>

                <div id="loading" style="display:none; text-align:center; margin-top:20px;">
                    <div class="spinner"></div>
                    <p style="margin-top:10px; color:var(--text-secondary);">處理中，請稍候...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        let preloadedTemplateBuffer = null;
        const submitBtn  = document.getElementById('submitBtn');
        const loadingDiv = document.getElementById('loading');
        const alertBox   = document.getElementById('alertBox');

        function saveToLocalStorage() {
            localStorage.setItem('seminar_title', document.getElementById('title').value);
            localStorage.setItem('meeting_name', document.getElementById('branch').value);
        }

        function loadFromLocalStorage() {
            const savedTitle = localStorage.getItem('seminar_title');
            if (savedTitle !== null) {
                document.getElementById('title').value = savedTitle;
            }
            const savedBranch = localStorage.getItem('meeting_name');
            if (savedBranch !== null) {
                document.getElementById('branch').value = savedBranch;
            }
        }

        document.getElementById('title').addEventListener('input', saveToLocalStorage);
        document.getElementById('branch').addEventListener('input', saveToLocalStorage);

        function cleanLineList() {
            const raw = document.getElementById('rawInput').value;
            if (!raw.trim()) {
                alert('請先輸入原始報名清單文字');
                return;
            }

            const lines = raw.split('\n');
            let firstLineIndex = -1;
            const numRegex = /^\s*[0-9①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳(（\[【]/;
            for (let i = 0; i < lines.length; i++) {
                if (numRegex.test(lines[i])) {
                    firstLineIndex = i;
                    break;
                }
            }

            let textToProcess = raw;
            if (firstLineIndex !== -1) {
                textToProcess = lines.slice(firstLineIndex).join('\n');
            }

            // 先用換行、逗號、頓號、分號分割成單一項目
            const items = textToProcess.split(/[\n,，、;；]/).map(s => s.trim()).filter(Boolean);
            const parsedNames = [];
            
            // 常用過濾關鍵字 (標頭/標尾/說明)
            const skipKeywords = [
                '接龍', '截止', '注意事項', '時間', '地點', '提醒', '謝謝', 
                '統計', '人數', '講座', '活動', '報名', '清單', '分享',
                '月例會', '會議', '聯絡', '大家', '各位', '恭喜', '備註',
                '說明', '群組', '主旨', '目的', '對象', '日期', '地點', '講師'
            ];

            for (let item of items) {
                // 檢查是否含有過濾關鍵字
                const hasKeyword = skipKeywords.some(kw => item.includes(kw));
                if (hasKeyword) continue;

                // 1. 移除前置編號及標點符號 (例如: "1.", "2、", "10. ", "①", "(1)")
                item = item.replace(/^[0-9\s.、。()（）\[\]【】①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳\-—+_]+/, '').trim();

                // 2. 移除尾端括號及其內容 (例如: "(隨喜)", "（開車）", "[備註]")
                item = item.replace(/[\s(（\[【][^()（）\[\]_【】]*[)）\]】]$/, '').trim();

                const m = item.match(/^(.*?)[\-–—:\：\s\+]+(.+)$/);
                if (m) {
                    const part1 = m[1].trim();
                    if (part1.length >= 2 && part1.length <= 6) {
                        item = part1;
                    }
                }

                item = item.replace(/\s+/g, '').trim();

                if (item && item.length >= 2 && item.length <= 8) {
                    parsedNames.push(item);
                }
            }

            document.getElementById('confirmedNames').value = parsedNames.join(',');
            
            alertBox.innerText = `✅ 已自動整理出 ${parsedNames.length} 筆姓名！請在下方欄位進行最終確認。`;
            alertBox.style.color = '#27ae60';
            alertBox.style.background = '#e8f8f0';
            alertBox.style.display = 'block';
        }

        async function submitForm() {
            const titleValue = document.getElementById('title').value.trim();
            const branchValue = document.getElementById('branch').value.trim();
            const confirmedNames = document.getElementById('confirmedNames').value.trim();

            if (!document.getElementById('signupForm').checkValidity()) {
                document.getElementById('signupForm').reportValidity();
                return;
            }

            if (!confirmedNames) {
                alertBox.innerText = '❌ 請先輸入報名清單，並按「整理接龍名單」或直接手動輸入確認名單。';
                alertBox.style.color = '#e74c3c';
                alertBox.style.background = '#fadbd8';
                alertBox.style.display = 'block';
                return;
            }

            loadingDiv.style.display = 'block';
            alertBox.style.display = 'none';
            submitBtn.disabled = true;

            try {
                if (!preloadedTemplateBuffer) {
                    throw new Error('無法載入 Excel 簽到單範本，請重新整理頁面');
                }

                const wb = XLSX.read(new Uint8Array(preloadedTemplateBuffer), { type: 'array', cellStyles: true, cellNF: true });
                const ws = wb.Sheets[wb.SheetNames[0]];

                const cellA1 = ws['A1'];
                if (cellA1) {
                    cellA1.t = 's';
                    cellA1.v = titleValue + "\r\n【" + branchValue + "分會】";
                    cellA1.w = undefined;
                    cellA1.h = undefined;
                    cellA1.r = undefined;

                    cellA1.s = {
                        alignment: {
                            horizontal: "center",
                            vertical: "center",
                            wrapText: true
                        }
                    };
                }

                for (let key in ws) {
                    if (key[0] === '!') continue;
                    const rowNum = parseInt(key.replace(/^[A-Z]+/, ''));
                    if (rowNum >= 3) {
                        delete ws[key];
                    }
                }

                const names = confirmedNames.split(',').map(n => n.trim()).filter(Boolean);
                const n = names.length;
                let total = 30;
                if (n > 28) {
                    total = (n + 2) % 2 === 0 ? n + 2 : n + 3;
                }
                const half = total / 2;

                ws['!rows'] = ws['!rows'] || [];
                ws['!rows'][0] = { hpt: 71.25 };
                ws['!rows'][1] = { hpt: 45.0 };

                const thinBorder = {
                    top: { style: "thin", color: { rgb: "000000" } },
                    bottom: { style: "thin", color: { rgb: "000000" } },
                    left: { style: "thin", color: { rgb: "000000" } },
                    right: { style: "thin", color: { rgb: "000000" } }
                };

                const headerStyle = { font: { name: "楷體-簡 標準體", sz: 16, bold: true }, alignment: { horizontal: "center", vertical: "center" }, border: thinBorder };
                const numStyle = { font: { name: "楷體-簡 標準體", sz: 16, bold: false }, alignment: { horizontal: "center", vertical: "center" }, border: thinBorder };
                const nameStyle = { font: { name: "楷體-簡 標準體", sz: 24, bold: false }, alignment: { horizontal: "center", vertical: "center" }, border: thinBorder };
                const signStyle = { font: { name: "楷體-簡 標準體", sz: 12, bold: false }, alignment: { horizontal: "center", vertical: "center" }, border: thinBorder };

                const headers = ["編號", "姓名", "簽到", "編號", "姓名", "簽到"];
                headers.forEach((h, idx) => {
                    const cellRef = String.fromCharCode(65 + idx) + '2';
                    ws[cellRef] = { t: 's', v: h, s: headerStyle };
                });

                for (let i = 0; i < half; i++) {
                    const leftNum = i + 1;
                    const rightNum = half + i + 1;
                    const leftName = leftNum <= n ? names[leftNum - 1] : "";
                    const rightName = rightNum <= n ? names[rightNum - 1] : "";
                    const actualRightNum = rightNum <= total ? rightNum : "";
                    
                    const excelRow = i + 3;
                    ws['!rows'][excelRow - 1] = { hpt: 45.0 };
                    
                    ws['A' + excelRow] = { t: 'n', v: leftNum, s: numStyle };
                    ws['B' + excelRow] = { t: 's', v: leftName, s: nameStyle };
                    ws['C' + excelRow] = { t: 's', v: "", s: signStyle };
                    
                    ws['D' + excelRow] = { t: 'n', v: actualRightNum, s: numStyle };
                    ws['E' + excelRow] = { t: 's', v: rightName, s: nameStyle };
                    ws['F' + excelRow] = { t: 's', v: "", s: signStyle };
                }

                ws['!ref'] = `A1:F${half + 2}`;
                ws['!cols'] = [ { wch: 7.5 }, { wch: 17.33 }, { wch: 16.5 }, { wch: 8.33 }, { wch: 19.0 }, { wch: 20.33 } ];

                const outputData = XLSX.write(wb, { type: 'array', bookType: 'xlsx', bookSST: true });
                
                const zip = await JSZip.loadAsync(outputData);
                let ssXml = await zip.file("xl/sharedStrings.xml").async("string");

                const escapedTitle = titleValue.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                const escapedBranch = branchValue.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

                const richTextSi = `<si><r><rPr><b/><sz val="24"/><color theme="1"/><rFont val="楷體-簡 標準體"/><charset val="134"/></rPr><t>${escapedTitle}</t></r><r><rPr><b/><sz val="20"/><color theme="1"/><rFont val="楷體-簡 標準體"/><charset val="134"/></rPr><t xml:space="preserve">\n</t></r><r><rPr><b/><sz val="20"/><color rgb="FFFF0000"/><rFont val="楷體-簡 標準體"/><charset val="134"/></rPr><t>【${escapedBranch}分會】</t></r><phoneticPr fontId="1" type="noConversion"/></si>`;

                const newSsXml = ssXml.replace(/<si>.*?<\/si>/s, richTextSi);
                zip.file("xl/sharedStrings.xml", newSsXml);

                const finalOutput = await zip.generateAsync({ type: 'arraybuffer' });
                const blob = new Blob([finalOutput], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                
                const chineseMonths = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二'];
                const curM = chineseMonths[new Date().getMonth()];
                const newName = `${curM}月佛學講座簽到單-${branchValue}.xlsx`;

                if (window.showSaveFilePicker) {
                    try {
                        const fileHandle = await window.showSaveFilePicker({
                            suggestedName: newName,
                            types: [{ description: 'Excel 試算表', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } }]
                        });
                        const writable = await fileHandle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                        alertBox.innerText = '✅ 簽到單已儲存完成';
                    } catch (e) {
                        if (e.name !== 'AbortError') throw e;
                        return;
                    }
                } else {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = newName;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                    alertBox.innerText = '✅ 簽到單產生完成並已下載';
                }
                alertBox.style.color = '#27ae60';
                alertBox.style.background = '#e8f8f0';
                alertBox.style.display = 'block';

            } catch (error) {
                console.error('處理失敗:', error);
                alertBox.innerText = '❌ 處理失敗：' + error.message;
                alertBox.style.color = '#e74c3c';
                alertBox.style.background = '#fadbd8';
                alertBox.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
                submitBtn.disabled = false;
            }
        }

        async function preloadTemplate() {
            try {
                const response = await fetch('./seminar.xlsx');
                if (response.ok) {
                    preloadedTemplateBuffer = await response.arrayBuffer();
                } else {
                    alertBox.innerText = '❌ 找不到伺服器上的 seminar.xlsx 範本檔案！';
                    alertBox.style.color = '#e74c3c';
                    alertBox.style.background = '#fadbd8';
                    alertBox.style.display = 'block';
                }
            } catch (e) {
                console.error('Preload template error:', e);
                alertBox.innerText = '❌ 連線讀取範本檔案失敗！';
                alertBox.style.color = '#e74c3c';
                alertBox.style.background = '#fadbd8';
                alertBox.style.display = 'block';
            }
        }

        async function initApp() {
            submitBtn.disabled = true;
            submitBtn.innerText = '載入範本中...';
            await preloadTemplate();
            if (preloadedTemplateBuffer) {
                submitBtn.disabled = false;
                submitBtn.innerText = '產生簽到單並下載 Excel';
            } else {
                alertBox.innerText = '❌ 系統初始化失敗，無法讀取簽到單範本檔案！';
                alertBox.style.color = '#e74c3c';
                alertBox.style.background = '#fadbd8';
                alertBox.style.display = 'block';
            }
        }

        window.addEventListener('load', () => {
            loadFromLocalStorage();
            initApp();
        });
    </script>
</body>
</html>
